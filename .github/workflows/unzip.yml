name: Bulletproof Auto Unzip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full repo history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip tree

      - name: Extract ALL zip files safely (bulletproof)
        run: |
          echo "============================================"
          echo "  Scanning repository for ZIP files..."
          echo "============================================"

          ZIP_COUNT=0
          FAIL_COUNT=0

          # أقوى مسح ممكن — يشمل المسافات والأحرف الخاصة في أسماء الملفات
          while IFS= read -r -d '' file; do
            echo ""
            echo "▶ Processing: $file"

            # اسم المجلد المستخرج — تنظيف الاسم من الأقواس والمسافات
            raw_base="$(basename "$file" .zip)"
            safe_base="$(echo "$raw_base" | tr ' ()[]{}' '_______')"
            folder="./extracted_${safe_base}"

            mkdir -p "$folder"

            # فك الضغط مع إجبار overwrite وعرض تفاصيل الأخطاء
            if unzip -o "$file" -d "$folder"; then
              echo "✅ Success: extracted to $folder"
              ZIP_COUNT=$((ZIP_COUNT + 1))
            else
              echo "❌ Failed: $file"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi

          done < <(find . \
            -not -path './.git/*' \
            -not -path './extracted_*' \
            -type f \
            -iname "*.zip" \
            -print0)

          echo ""
          echo "============================================"
          echo "  Done! ✅ Extracted: $ZIP_COUNT | ❌ Failed: $FAIL_COUNT"
          echo "============================================"

          # عرض هيكل المجلدات المستخرجة
          echo ""
          echo "📂 Extracted folder structure:"
          find . -maxdepth 3 -path './extracted_*' | tree --fromfile 2>/dev/null || \
          find . -maxdepth 3 -path './extracted_*' -print

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # إضافة كل الملفات المستخرجة فقط
          git add ./extracted_* 2>/dev/null || true
          git add -A

          # Commit فقط إذا في تغييرات فعلية
          if git diff --cached --quiet; then
            echo "⚠️  No new changes to commit."
          else
            git commit -m "🤖 Auto unzip: extracted ZIP files [skip ci]"
            git push
            echo "✅ Changes pushed successfully."
          fi
