# =============================================================================
# docker-compose.yml — Universal Full-Stack Deployment
# ONE command: docker compose up -d
# Works on: Any VPS, Coolify, Portainer, CapRover, Dokku, Any Docker Cloud
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alk_pass}
      POSTGRES_DB: ${POSTGRES_DB:-affiliate_launch_kit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alk_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-alk_user}:${POSTGRES_PASSWORD:-alk_pass}@postgres:5432/${POSTGRES_DB:-affiliate_launch_kit}
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-256-bit-random-string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too-in-production-256-bit}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      HASH_SECRET: ${HASH_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-insecure-encryption-key-rotate-me}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      JVZOO_SECRET_KEY: ${JVZOO_SECRET_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-onboarding@resend.dev}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      AI_USE_REAL_LLM: ${AI_USE_REAL_LLM:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:${BACKEND_PORT:-3000}/api > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
